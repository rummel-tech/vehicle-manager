# Nginx configuration for CONTEXT PATH deployment
# Deploy Vehicle Manager at /vehicle-manager/

server {
    listen 80;
    server_name yourdomain.com;

    # Main site at root (if any)
    location = / {
        root /var/www/main-site;
        index index.html;
    }

    # Vehicle Manager Frontend at /vehicle-manager
    location /vehicle-manager {
        alias /var/www/vehicle-manager/frontend;
        index index.html;
        try_files $uri $uri/ /vehicle-manager/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Vehicle Manager API at /vehicle-manager/api
    location /vehicle-manager/api/ {
        proxy_pass http://127.0.0.1:8030/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API docs
    location /vehicle-manager/api/docs {
        proxy_pass http://127.0.0.1:8030/vehicle-manager/api/docs;
        proxy_set_header Host $host;
    }
}
